name: Build macOS apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version for test builds, such as 1.0.0
        required: false
        default: 0.0.0
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Create tag release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes --title "VisioALS $GITHUB_REF_NAME"

  build:
    name: Build ${{ matrix.download_arch }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            machine_arch: arm64
            download_arch: Apple-Silicon
          - runner: macos-15-intel
            machine_arch: x86_64
            download_arch: Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      VISIOALS_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-macos.txt
            requirements-build.txt

      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.machine_arch }}"

      - name: Build app and DMG
        run: ./macos/build_macos.sh

      - name: Inspect bundle metadata
        run: |
          plutil -p "dist/macos-${{ matrix.machine_arch }}/VisioALS.app/Contents/Info.plist"
          file "dist/macos-${{ matrix.machine_arch }}/VisioALS.app/Contents/MacOS/VisioALS"
          codesign --verify --deep --strict "dist/macos-${{ matrix.machine_arch }}/VisioALS.app"

      - name: Upload DMG to tag release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release/VisioALS-*-macOS-${{ matrix.download_arch }}.dmg --repo "$GITHUB_REPOSITORY" --clobber
